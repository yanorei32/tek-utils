name: Review

on:
  pull_request:
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/review.yml'


env:
  CARGO_INCREMENTAL: 0

jobs:
  rust:
    permissions:
      checks: write

    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - run: |
          # depName=rustfs/cli
          RUSTFS_CLI_VERSION="v0.1.16"
          RUSTFS_CLI_TAR_NAME="rustfs-cli-linux-amd64-$RUSTFS_CLI_VERSION.tar.gz"
          wget "https://github.com/rustfs/cli/releases/download/$RUSTFS_CLI_VERSION/$RUSTFS_CLI_TAR_NAME"
          tar xf "$RUSTFS_CLI_TAR_NAME"
          rm "$RUSTFS_CLI_TAR_NAME"
          sudo mv rc /bin/

          rc alias set yr32srv https://rustfs-s3.yr32.net tek-utils-ci "${{ secrets.YR32SRV_TEK_UTILS_CI_SECRET }}"
          rc cp yr32srv/visa/ni-ubuntu2404-drivers-stream.deb ./ni-ubuntu2404-drivers-stream.deb
          sudo apt install ./ni-ubuntu2404-drivers-stream.deb
          sudo apt update -y
          sudo apt install -y libvisa-dev

      - uses: actions-rs/toolchain@v1.0.7
        with:
          toolchain: stable
          components: clippy
          override: true

      - name: cache dependencies
        uses: Swatinem/rust-cache@v2.9.1

      - name: clippy check
        uses: actions-rs/clippy-check@v1.0.7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --all-features

      - name: compile for unit test
        uses: actions-rs/cargo@v1.0.3
        with:
          command: test
          args: --no-run --locked

      - name: unit test
        uses: actions-rs/cargo@v1.0.3
        with:
          command: test
